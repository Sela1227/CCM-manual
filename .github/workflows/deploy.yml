name: 部署 MkDocs 到 GitHub Pages

on:
  push:
    branches:
      - main        # 每次推送到 main 分支就自動部署
  workflow_dispatch: # 也可以手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 抓完整歷史，讓 MkDocs 可以顯示最後修改時間

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 安裝 MkDocs 與套件
        run: pip install -r requirements.txt

      - name: 建置網站
        run: mkdocs build

      - name: 上傳產出物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
