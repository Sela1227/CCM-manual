site_name: 癌症個管師指導書
site_description: 彰濱秀傳癌症中心｜癌症個案管理師工作資源平台
site_url: https://Sela1227.github.io/CCM-manual/

# 預設 Material 主題，最小化 features 設定
theme:
  name: material
  language: zh-TW
  font:
    text: Noto Sans TC
    code: Noto Sans Mono
  palette:
    # 淺色模式（主色 #25506b 由 extra.css 透過 :root 覆蓋變數設定）
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切換到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切換到淺色模式
  features:
    # 導覽
    - navigation.top              # 回到頁首按鈕
    - navigation.tracking         # URL 跟著滾動更新
    # 內容
    - content.code.copy           # 程式碼複製按鈕
    - content.tabs.link           # 同名 tab 連動
    - toc.follow                  # TOC 跟著捲動
    # 搜尋
    - search.suggest              # 搜尋建議
    - search.highlight            # 搜尋結果高亮
  icon:
    repo: fontawesome/brands/github

# 17 條平鋪頂層頁面（無巢狀，遵守規則 3）
# 用編號（A1/A2/B1/B2/C0–C6/D/E/F/G/H1–H4）做視覺分組，無 emoji
nav:
  - 首頁: index.md
  - A1 工作指導手冊: A_work-guide.md
  - A2 培訓計畫書: A_training-plan.md
  - B1 HIS 系統操作手冊: B1_HIS-manual.md
  - B2 其他工具使用說明: B2_other-tools.md
  - C0 癌症照護通論: C0_general.md
  - C1 肺癌照護指引: C1_lung-cancer.md
  - C2 乳癌照護指引: C2_breast-cancer.md
  - C3–C6 其他癌別照護指引: C3-C6_other-cancers.md
  - D 表單與範本: D_forms.md
  - E 專題與進階: E_advanced.md
  - F 臨床知識庫: F_clinical-kb.md
  - G 品質指標速查: G_quality-index.md
  - H1 個管追蹤系統: H1_ccm-tracker-guide.md
  - H2 MDT 會議管理系統: H2_mdt-guide.md
  - H3 抗癌藥物速查: H3_cancer-drugs.md
  - H4 病歷互審系統: H4_peer-review-guide.md

# 外掛
plugins:
  - search:
      # 中文標點當分隔符；jieba 套件存在時，Material 內建 search 會自動啟用中文分詞
      separator: '[\s\-\u3001\u3002\uff0c\uff01\uff1f\uff1a\u300a\u300b\u3010\u3011\uff08\uff09\u300c\u300d]'

# 自訂 CSS / JS（極簡）
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Markdown 擴充
markdown_extensions:
  # 基礎
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  # PyMdown 擴充
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Repo 連結（顯示在右上角）
repo_url: https://github.com/Sela1227/CCM-manual
repo_name: Sela1227/CCM-manual
edit_uri: ""

# 頁尾額外資訊
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sela1227/CCM-manual
