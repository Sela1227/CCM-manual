site_name: 彰濱秀傳癌症中心 - 個管師教育訓練指導書
site_description: 彰濱秀傳癌症中心個案管理師工作手冊、培訓資源與專用軟體操作說明
site_author: 彰濱秀傳癌症中心
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  font:
    text: Noto Sans TC
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.prune
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\u3001\u3002\uff0c\uff01\uff1f\uff1a\u300a\u300b\u3010\u3011\uff08\uff09\u300c\u300d]'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
      title: 本頁目錄
  - attr_list
  - md_in_html
  - def_list

nav:
  - 首頁: index.md
  - A｜新人通則:
    - 工作指導手冊: A_work-guide.md
    - 培訓計畫書: A_training-plan.md
  - B｜軟體操作:
    - B1. HIS 系統操作手冊: B1_HIS-manual.md
    - B2. 其他工具使用說明: B2_other-tools.md
  - C｜各癌別照護指引:
    - C1. 肺癌照護指引: C1_lung-cancer.md
    - C2. 乳癌照護指引: C2_breast-cancer.md
    - C3–C6. 其他癌別照護指引: C3-C6_other-cancers.md
  - D｜表單與範本:
    - 表單與範本: D_forms.md
  - E｜專題與進階:
    - 專題與進階: E_advanced.md
  - F｜臨床知識庫:
    - 臨床知識庫: F_clinical-kb.md
  - G｜品質指標:
    - 品質指標速查: G_quality-index.md
  - H｜專用軟體:
    - 個管追蹤系統: H1_ccm-tracker-guide.md
    - MDT 會議管理系統: H2_mdt-guide.md
    - 抗癌藥物速查系統: H3_cancer-drugs.md
    - 病歷互審系統: H4_peer-review-guide.md

extra:
  social:
    - icon: fontawesome/solid/hospital
      link: https://www.chshowchwan.com.tw
      name: 彰濱秀傳紀念醫院

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mobile-nav.js
