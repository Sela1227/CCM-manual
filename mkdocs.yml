site_name: 癌症個管師指導書
site_description: 彰濱秀傳癌症中心｜癌症個案管理師工作資源平台
site_url: https://Sela1227.github.io/CCM-manual/

# 預設 Material 主題，最小化 features 設定
theme:
  name: material
  language: zh-TW
  font:
    text: Noto Sans TC
    code: Noto Sans Mono
  palette:
    # 淺色模式（預設，使用自訂主色 #C9C8C7）
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切換到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切換到淺色模式
  features:
    # 導覽
    - navigation.top              # 回到頁首按鈕
    - navigation.tracking         # URL 跟著滾動更新
    # 內容
    - content.code.copy           # 程式碼複製按鈕
    - content.tabs.link           # 同名 tab 連動
    - toc.follow                  # TOC 跟著捲動
    # 搜尋
    - search.suggest              # 搜尋建議
    - search.highlight            # 搜尋結果高亮
  icon:
    repo: fontawesome/brands/github

# 5 個平鋪頂層頁面，沒有任何巢狀
nav:
  - 首頁: index.md
  - 工作: 01_work.md
  - 養成: 02_training.md
  - 工具: 03_tools.md
  - 指標: 04_metrics.md

# 外掛
plugins:
  - search:
      # 中文標點當分隔符；jieba 套件存在時，Material 內建 search 會自動啟用中文分詞
      separator: '[\s\-\u3001\u3002\uff0c\uff01\uff1f\uff1a\u300a\u300b\u3010\u3011\uff08\uff09\u300c\u300d]'

# 自訂 CSS / JS（極簡）
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Markdown 擴充
markdown_extensions:
  # 基礎
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  # PyMdown 擴充
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Repo 連結（顯示在右上角）
repo_url: https://github.com/Sela1227/CCM-manual
repo_name: Sela1227/CCM-manual
edit_uri: ""

# 頁尾額外資訊
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sela1227/CCM-manual
