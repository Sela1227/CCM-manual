site_name: 彰濱秀傳癌症中心 - 個管師訓練系統
site_description: 彰濱秀傳癌症中心癌症個案管理師工作資源平台
site_url: https://Sela1227.github.io/CCM-manual/

# 預設 Material 主題，最小化 features 設定
theme:
  name: material
  language: zh-TW
  # Logo（左上角 header）+ favicon（瀏覽器分頁）
  logo: assets/logo-header.png
  favicon: assets/favicon.png
  font:
    text: Noto Sans TC
    code: Noto Sans Mono
  palette:
    # 淺色模式（主色 #25506b 由 extra.css 透過 :root 覆蓋變數設定）
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切換到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切換到淺色模式
  features:
    # 導覽
    - navigation.top              # 回到頁首按鈕
    - navigation.tracking         # URL 跟著滾動更新
    # 內容
    - content.code.copy           # 程式碼複製按鈕
    - content.tabs.link           # 同名 tab 連動
    - toc.follow                  # TOC 跟著捲動
    # 搜尋
    - search.suggest              # 搜尋建議
    - search.highlight            # 搜尋結果高亮

# Nav 結構
# 規則 3 修訂版（V3.4.0 路線 C）：viewport 真相揭露 + V3.3.0 巢狀 A 組實測通過後，
# 推到 8 組全巢狀。條件不變：
#   1. CSS 不可加回 sidebar override（@media min-width: 760px）
#   2. 部署後實測 sidebar 無重複/標題錯位
#   3. 出問題就 git revert，不要試著用 CSS 蓋
nav:
  - 首頁: index.md
  - A 新人通則:
    - A1 工作指導手冊: A_work-guide.md
    - A2 培訓計畫書: A_training-plan.md
  - 軟體與工具:
    - B1 HIS 系統操作手冊: B1_HIS-manual.md
    - B2 其他工具使用說明: B2_other-tools.md
    - H1 個管追蹤系統（癌症中心專用）: H1_ccm-tracker-guide.md
    - H2 MDT 會議管理系統（癌症中心專用）: H2_mdt-guide.md
    - H3 抗癌藥物速查（癌症中心專用）: H3_cancer-drugs.md
    - H4 病歷互審系統（癌症中心專用）: H4_peer-review-guide.md
  - C 各癌別照護指引:
    - C0 癌症照護通論: C0_general.md
    - C1 肺癌照護指引: C1_lung-cancer.md
    - C2 乳癌照護指引: C2_breast-cancer.md
    - C3–C6 其他癌別照護指引: C3-C6_other-cancers.md
  - D 表單與範本: D_forms.md
  - E 專題與進階: E_advanced.md
  - F 臨床知識庫: F_clinical-kb.md
  - G 品質指標速查: G_quality-index.md

# 外掛
plugins:
  - search:
      # 中文標點當分隔符；jieba 套件存在時，Material 內建 search 會自動啟用中文分詞
      separator: '[\s\-\u3001\u3002\uff0c\uff01\uff1f\uff1a\u300a\u300b\u3010\u3011\uff08\uff09\u300c\u300d]'

# 自訂 CSS / JS
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# Markdown 擴充
markdown_extensions:
  # 基礎
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
  # PyMdown 擴充
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# 頁尾
extra:
  generator: false
